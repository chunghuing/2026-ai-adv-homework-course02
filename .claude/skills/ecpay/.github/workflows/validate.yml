name: Validate AI Section Index

on:
  pull_request:
    paths:
      - 'guides/**'
      - 'references/**'
      - 'scripts/validate-ai-index.sh'
      - 'scripts/validate-version-sync.sh'
      - 'scripts/validate-agents-parity.sh'
      - 'scripts/validate-internal-links.sh'
      - 'scripts/validate-guides-refs-consistency.sh'
      - 'test-vectors/**'
      - 'SKILL.md'
      - 'SKILL_OPENAI.md'
      - 'README.md'
      - 'SETUP.md'
      - 'AGENTS.md'
      - 'GEMINI.md'
      - 'CONTRIBUTING.md'
      - '.github/workflows/**'
  push:
    branches:
      - master
      - main
    paths:
      - 'guides/**'
      - 'references/**'
      - 'scripts/validate-ai-index.sh'
      - 'scripts/validate-version-sync.sh'
      - 'scripts/validate-agents-parity.sh'
      - 'scripts/validate-internal-links.sh'
      - 'scripts/validate-guides-refs-consistency.sh'
      - 'test-vectors/**'
      - 'SKILL.md'
      - 'SKILL_OPENAI.md'
      - 'README.md'
      - 'SETUP.md'
      - 'AGENTS.md'
      - 'GEMINI.md'
      - 'CONTRIBUTING.md'
      - '.github/workflows/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate workflow YAML syntax
        run: |
          echo "Checking all workflow YAML files for syntax errors..."
          python3 << 'PYEOF'
          import yaml, glob, sys
          failed = False
          for f in sorted(glob.glob('.github/workflows/*.yml')):
              try:
                  with open(f, encoding='utf-8') as fh:
                      yaml.safe_load(fh)
                  print(f'  OK: {f}')
              except yaml.YAMLError as e:
                  print(f'FAIL: {f}: {e}')
                  failed = True
          if failed:
              print('::error::One or more workflow YAML files have syntax errors')
              sys.exit(1)
          PYEOF

      - name: Validate AI Section Index line numbers
        run: bash scripts/validate-ai-index.sh
      - name: Validate version sync across all 9 files
        run: bash scripts/validate-version-sync.sh
      - name: Validate AGENTS.md ↔ GEMINI.md invariant sections
        run: bash scripts/validate-agents-parity.sh
      - name: Validate internal cross-guide links
        run: bash scripts/validate-internal-links.sh
      - name: Validate guides ↔ references ↔ scripts consistency
        run: bash scripts/validate-guides-refs-consistency.sh
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install pycryptodome
        run: pip install "pycryptodome>=3.20,<4"
      - name: Verify test vectors (Python - primary)
        run: python test-vectors/verify.py
      - name: Verify test vectors (Node.js - cross-language check for JS trap family)
        run: node test-vectors/verify-node.js

      # V3.0+: Syntax/compile check for Go/Java verifiers (cross-language guard).
      # Full execution is skipped to avoid toolchain complexity; compile success catches
      # refactor breakage (e.g. stale function signatures after cipher API changes).
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
      - name: Build-compile Go verifier (syntax + type check)
        run: go build -o /tmp/verify-go-bin ./test-vectors/verify-go.go

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build-compile Java verifier (syntax + type check)
        run: javac -d /tmp test-vectors/verify-java.java
